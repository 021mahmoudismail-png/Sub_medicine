function shuffle(array) {
  let currentIndex = array.length, randomIndex;
  while (currentIndex != 0) {
    randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex--;
    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
  }
  return array;
}

function startAll() {
  let all = [];
  db.forEach((t, tIdx) => {
    t[1].forEach((q, qIdx) => {
      all.push({ tIdx, qIdx, data: q, topic: t[0] });
    });
  });
  currentQuiz = shuffle(all);
  currentIndex = 0;
  isReview = false;
  topicTitle = "All Topics (Random)";
  renderQuestion();
}

function startTopic(idx) {
  currentQuiz = db[idx][1].map((q, qIdx) => ({ tIdx: idx, qIdx: qIdx, data: q, topic: db[idx][0] }));
  currentIndex = 0;
  isReview = false;
  topicTitle = db[idx][0];
  renderQuestion();
}

function startReview() {
  currentQuiz = shuffle([...mistakes]);
  currentIndex = 0;
  isReview = true;
  topicTitle = "Reviewing Mistakes";
  renderQuestion();
}

    </div>

    <div class="mt-6 flex justify-between slide-in">
      <button onclick="prevQ()" class="px-6 py-3 rounded-xl font-bold text-slate-600 bg-white border border-slate-200 shadow-sm hover:bg-slate-50 hover:text-blue-600 transition ${currentIndex === 0 ? 'opacity-50 cursor-not-allowed' : ''}" ${currentIndex === 0 ? 'disabled' : ''}>
        &larr; Previous
      </button>
      <button id="next-btn" onclick="nextQ()" class="px-8 py-3 rounded-xl font-bold text-white bg-slate-300 cursor-not-allowed transition flex items-center" disabled>
        Next Question &rarr;
      </button>
    </div>
  `;
}

function selectOption(idx) {
  const qObj = currentQuiz[currentIndex];
  const q = qObj.data;
  const correctIdxs = Array.isArray(q[2]) ? q[2] : [q[2]];
  const isCorrect = correctIdxs.includes(idx);

  const btns = document.querySelectorAll('.option-btn');
  // Prevent multiple clicks
  if (btns[0].disabled) return; 

  btns.forEach((btn, i) => {
    btn.disabled = true;
    btn.classList.remove('hover:border-blue-400', 'hover:bg-blue-50', 'border-slate-200');

    if (correctIdxs.includes(i)) {
      btn.classList.add('border-green-500', 'bg-green-50', 'text-green-800');
      btn.children[0].classList.replace('bg-slate-100', 'bg-green-200');
      btn.children[0].classList.replace('text-slate-500', 'text-green-800');
    } else if (i === idx && !isCorrect) {
      btn.classList.add('border-red-500', 'bg-red-50', 'text-red-800');
      btn.children[0].classList.replace('bg-slate-100', 'bg-red-200');
      btn.children[0].classList.replace('text-slate-500', 'text-red-800');
    } else {
      btn.classList.add('opacity-40');
    }
  });

  if (!isCorrect && !isReview) {
    const exists = mistakes.some(m => m.tIdx === qObj.tIdx && m.qIdx === qObj.qIdx);
    if (!exists) mistakes.push(qObj);
  } else if (isCorrect && isReview) {
    // If answered correctly in review mode, remove from mistakes
    mistakes = mistakes.filter(m => !(m.tIdx === qObj.tIdx && m.qIdx === qObj.qIdx));
  }

  document.getElementById('explanation').classList.remove('hide');

  const nextBtn = document.getElementById('next-btn');
  nextBtn.disabled = false;
  nextBtn.classList.remove('bg-slate-300', 'cursor-not-allowed');
  nextBtn.classList.add('bg-blue-600', 'hover:bg-blue-700', 'shadow-md');
  if (currentIndex === currentQuiz.length - 1) {
    nextBtn.innerHTML = "Finish Quiz &rarr;";
  }
}

function nextQ() {
  currentIndex++;
  renderQuestion();
}

function prevQ() {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
  }
}

// Start app
window.onload = renderHome;
</script>
</body>
</html>
