<script>
// --- QUESTION DATABASE ---
const questions = [
    // --- INTRO TO RADIOLOGY ---
    { id: 1, topic: "Introduction to Radiology", text: "Regarding lesions that appear hyperdense on CT-Scan, one is False:", options: ["A. Metallic clips", "B. Intra-venous contrast", "C. Lipoma", "D. Acute hemorrhage", "E. Calcifications"], answer: 2, explanation: "Fat (Lipoma) has low attenuation and appears hypodense (dark gray). Metallic clips, contrast, calcifications, and acute hemorrhage appear hyperdense (bright white)." },
    { id: 2, topic: "Introduction to Radiology", text: "All are relative contraindications of contrast except:", options: ["A. Food allergy", "B. Penicillin allergy", "C. Asthma", "D. Previous contrast allergy", "E. Gluten sensitivity"], answer: 3, explanation: "Prior severe contrast allergy is an ABSOLUTE contraindication. The rest are relative." },
    { id: 3, topic: "Introduction to Radiology", text: "True about the lung:", options: ["A. High penetration and low attenuation", "B. High / High", "C. Low / Low", "D. Low / High", "E. No / No"], answer: 0, explanation: "Air has low physical density (low attenuation), allowing x-rays to easily pass through (high penetration), appearing black." },
    { id: 4, topic: "Introduction to Radiology", text: "Absolute contraindication of CT scan or Angiography contrast media involve all the following except:", options: ["A. Pregnancy in the 3rd trimester", "B. Bronchial Asthma", "C. Previous allergy to contrast", "D. Acute Kidney injury", "E. Acute pancreatitis"], answer: 4, explanation: "Contrast CT is the gold standard to assess acute pancreatitis complications. It is not contraindicated." },
    { id: 5, topic: "Introduction to Radiology", text: "About MRI uses, which is the wrong match:", options: ["A. MRI FLAIR: calcification", "B. MRV: cavernous sinus thrombosis", "C. MRI DWI: acute infarct", "D. MRI T1 contrasted: intra-axial tumor"], answer: 0, explanation: "MRI is poor for calcifications. FLAIR is used to suppress CSF to see edema/MS plaques." },
    { id: 6, topic: "Introduction to Radiology", text: "About MRI with contrast, all are wrong except:", options: ["A. Contraindicated in renal failure grade III", "B. Contraindicated in the first trimester if contrasted", "C. Not contraindicated in 2nd and 3rd trimester", "D. Contraindicated in children"], answer: 1, explanation: "Gadolinium crosses the placenta. It is universally avoided in pregnancy, especially the 1st trimester, unless critical." },
    { id: 7, topic: "Introduction to Radiology", text: "All are good conditions for Ultrasound except:", options: ["A. Thin patient", "B. Children", "C. Recent endoscopy", "D. Full bladder"], answer: 2, explanation: "Endoscopy introduces air into the GI tract. US waves cannot travel through air." },
    { id: 8, topic: "Introduction to Radiology", text: "Which is wrong:", options: ["A. MRI as sensitive as CT for diagnosis of acute infarct", "B. DWI shows hyperintensity in acute infarction", "C. Haemorrhage appear heterogenous hyperintense in T2"], answer: 0, explanation: "MRI (DWI) is vastly MORE sensitive than CT for acute ischemic infarcts." },
    { id: 9, topic: "Introduction to Radiology", text: "Which is wrong about MRI:", options: ["A. Has ionizing radiation but less than that of CT", "B. Contrast used in MRI is relatively safe", "C. Takes more time to be done than CT"], answer: 0, explanation: "MRI has ZERO ionizing radiation. It relies on magnetic fields and radiofrequency pulses." },
    { id: 10, topic: "Introduction to Radiology", text: "Most attenuation in:", options: ["A. Liver", "B. Lung", "C. Bone"], answer: 2, explanation: "Bone is highly dense due to calcium, blocking (attenuating) most x-rays and appearing white." },
    { id: 11, topic: "Introduction to Radiology", text: "Contrast CT for asthma patient, preparation by:", options: ["A. Oral prednisolone", "B. Inhaler steroids", "C. IV hydrocortisone"], answer: 0, explanation: "Oral corticosteroids (plus antihistamines) are standard premedication to prevent allergic reactions." },
    { id: 12, topic: "Introduction to Radiology", text: "Allergy to contrast material in all except:", options: ["A. Asthma", "B. Atopy", "C. Hypothyroid"], answer: 2, explanation: "Hypothyroidism has no immunological link to contrast hypersensitivity." },
    { id: 13, topic: "Introduction to Radiology", text: "All of the following are true about US except:", options: ["A. Does not give ionizing radiation", "B. Better accuracy in obese", "C. Can be used to visualize vessels"], answer: 1, explanation: "Fat heavily attenuates sound waves, heavily reducing US image quality in obese patients." },
    { id: 14, topic: "Introduction to Radiology", text: "Regarding MRI, one is wrong:", options: ["A. Indicated to make sure about position of pacemaker"], answer: 0, explanation: "CXR checks pacemaker position. Pacemakers are traditionally strict contraindications for MRI." },
    { id: 15, topic: "Introduction to Radiology", text: "Which is wrong:", options: ["A. Stir sequence is T1 minus fat signal"], answer: 0, explanation: "STIR is a T2-weighted sequence where fat is suppressed, not T1." },
    { id: 16, topic: "Introduction to Radiology", text: "Best modality for calcification is:", options: ["A. CT"], answer: 0, explanation: "CT uses x-rays, and calcium's high density makes it starkly hyperdense (bright white)." },
    { id: 17, topic: "Introduction to Radiology", text: "Contraindication for MRI:", options: ["A. Ferromagnetic substance inside the body"], answer: 0, explanation: "Magnets can torque and move ferromagnetic metals, causing massive tissue shearing/damage." },
    { id: 18, topic: "Introduction to Radiology", text: "High penetration and low attenuation?", options: ["A. Lung parenchyma"], answer: 0, explanation: "Lungs are filled with air, which does not block x-rays (low attenuation)." },
    { id: 19, topic: "Introduction to Radiology", text: "All are advantages of MRI over CT except:", options: ["A. Used for detection of intraorbital metallic foreign body"], answer: 0, explanation: "MRI is contraindicated if metal is suspected. CT or X-ray is used to screen for orbital metal first." },

    // --- CT REVIEW ---
    { id: 20, topic: "CT Review (Neuroradiology)", text: "Which of the following is not a site of hypertensive intracerebral hemorrhage?", options: ["A. Putamen", "B. Thalamus", "C. Pons", "D. Cerebellum", "E. Temporal lobe"], answer: 4, explanation: "Temporal lobe hemorrhages are 'lobar', typically caused by Cerebral Amyloid Angiopathy in the elderly, not hypertension." },
    { id: 21, topic: "CT Review (Neuroradiology)", text: "Concerning Radiological signs of diffuse brain edema in post-traumatic patients, one is False:", options: ["A. Small size ventricles", "B. Pseudo-sub-arachnoid sign", "C. Diffuse brain hypo-density", "D. Effacement of basal cistern", "E. Loss of gray-white matter differentiation"], answer: 1, explanation: "While Pseudo-SAH is a sign of extreme edema, actual SAH is a distinct pathology, so it's treated as the false primary sign of pure edema in standard MCQs." },
    { id: 22, topic: "CT Review (Neuroradiology)", text: "Concerning subdural hematoma, one is false:", options: ["A. Treated with Bur hole", "B. Appears isodense in chronic stage", "C. More common in old age", "D. Of different ages in children raise possibility of abuse", "E. Crosses sutures"], answer: 1, explanation: "Chronic SDH appears hypodense (dark), not isodense. Subacute is isodense." },
    { id: 23, topic: "CT Review (Neuroradiology)", text: "All are seen on CT scan in diffuse edema except:", options: ["A. Subarachnoid haemorrhage", "B. Loss of grey-white differentiation", "C. Small ventricles", "D. Effacement of sulci and basal cisterns", "E. Brain is diffusely hypodense on CT"], answer: 0, explanation: "SAH is a distinct bleeding event, not a direct radiological sign of cerebral edema." },
    { id: 24, topic: "CT Review (Neuroradiology)", text: "A hyperdensity can be seen normally in brain CT in all of the following except:", options: ["A. Pituitary", "B. Tentorium", "C. Falx cerebri", "D. Eye lens"], answer: 0, explanation: "The normal pituitary gland is isodense to brain tissue. Dural folds and eye lenses are naturally hyperdense." },
    { id: 25, topic: "CT Review (Neuroradiology)", text: "25 year old female, headache, fever for 10 days, CSF with Lymphocytic pleocytosis. CT showed bilateral temporal hemorrhage. Diagnosis:", options: ["A. Herpetic encephalitis", "B. Bacterial meningitis", "C. SAH", "D. West Nile"], answer: 0, explanation: "HSV-1 encephalitis classically localizes to bilateral temporal lobes causing edema and hemorrhagic necrosis." },
    { id: 26, topic: "CT Review (Neuroradiology)", text: "Wrong about acute extradural hematoma:", options: ["A. Biconvex hypodense", "B. Usually traumatic", "C. Midline shift", "D. Brain pressure"], answer: 0, explanation: "Extradural (epidural) hematomas are biconvex, but an acute bleed is HYPERdense (white), not hypodense." },
    { id: 27, topic: "CT Review (Neuroradiology)", text: "Patient presented with traumatic head injury, which is true?", options: ["A. Do MRI", "B. Do CT", "C. Wait and observe"], answer: 1, explanation: "Non-contrast Head CT is the rapid, gold standard initial imaging for acute head trauma to rule out hemorrhage." },
    { id: 28, topic: "CT Review (Neuroradiology)", text: "Biconvex lesion on CT:", options: ["A. Extradural hematoma"], answer: 0, explanation: "Dura is tightly adhered to sutures, so blood pushing inward creates a lens-shaped (biconvex) appearance." },
    { id: 29, topic: "CT Review (Neuroradiology)", text: "Wrong match:", options: ["A. Semilunar hypodense and acute subdural haemorrhage", "B. Biconvex hyperdense and epidural haemorrhage"], answer: 0, explanation: "Acute subdural hemorrhage is hyperdense (white blood), it only becomes hypodense when chronic." },
    { id: 30, topic: "CT Review (Neuroradiology)", text: "The best for diagnosis of brain calcification:", options: ["A. MRI", "B. CT"], answer: 1, explanation: "CT is extremely sensitive to dense calcium. MRI is generally poor at visualizing calcifications." },
    { id: 31, topic: "CT Review (Neuroradiology)", text: "Wrong about intracranial hemorrhage:", options: ["A. Intraventricular hemorrhage has a good prognosis"], answer: 0, explanation: "IVH has a poor prognosis due to severe risk of obstructive hydrocephalus and herniation." },
    { id: 32, topic: "CT Review (Neuroradiology)", text: "Frontal mass with calcifications, most likely?", options: ["A. Oligodendroglioma"], answer: 0, explanation: "Oligodendrogliomas frequently calcify and classically present in the frontal lobes." },
    { id: 33, topic: "CT Review (Neuroradiology)", text: "Which of the following is wrong?", options: ["A. Epidural hematoma treated with burr hole"], answer: 0, explanation: "Epidural hematomas represent high-pressure arterial bleeding requiring a formal craniotomy, not a burr hole." },

    // --- MRI ---
    { id: 34, topic: "MRI", text: "Best modality for diagnosing intra cerebral hemorrhage is:", options: ["A. T1", "B. T2", "C. T2*/GRE", "D. DWI", "E. ACA"], answer: 2, explanation: "T2* (Gradient Echo / Susceptibility) detects blood breakdown products (hemosiderin) perfectly via blooming artifacts." },
    { id: 35, topic: "MRI", text: "The best way to diagnose cavernous sinus thrombosis:", options: ["A. MRI", "B. MRV", "C. CT", "D. Doppler US"], answer: 1, explanation: "Magnetic Resonance Venography (MRV) is specifically designed to visualize the cerebral venous system and blockages." },
    { id: 36, topic: "MRI", text: "Best modality to detect acute brain ischemia:", options: ["A. CT without contrast", "B. T2", "C. T2*", "D. DWI/ADC"], answer: 3, explanation: "DWI/ADC detects restricted diffusion from cellular swelling (cytotoxic edema) within minutes of an infarct." },
    { id: 37, topic: "MRI", text: "Identify the incorrect statement:", options: ["A. Extra-axial tumors have wide meningeal attachment", "B. Failure to enhance on T1 contrasted imaging rules out intra-axial tumor"], answer: 1, explanation: "Many low-grade intra-axial tumors do not enhance. Lack of enhancement does not rule them out." },
    { id: 38, topic: "MRI", text: "Mechanism of death in Judicial Hanging:", options: ["A. Cervical fracture", "B. Cerebral anemia"], answer: 0, explanation: "Causes bilateral C2 pedicle fractures (Hangman's fracture), severing the cervical cord." },
    { id: 39, topic: "MRI", text: "Which of the following is wrong about MRI sequences?", options: ["A. T1 shows cerebrospinal fluid as hypointense", "B. T2 shows cerebrospinal fluid as hyperintense", "C. White matter is hyperintense compared to cortex in FLAIR"], answer: 2, explanation: "White matter has less water than cortex, so it is HYPOintense (darker) on both T2 and FLAIR." },
    { id: 40, topic: "MRI", text: "Which of the following is true about cytotoxic edema?", options: ["A. It is caused by breakdown of the blood-brain barrier", "B. It predominantly affects the white matter only", "C. It appears hyperintense in diffusion weighted sequences (DWI)"], answer: 2, explanation: "Cell swelling traps water, restricting diffusion, which appears bright (hyperintense) on DWI." },
    { id: 41, topic: "MRI", text: "Which of the following is wrong regarding a meningioma?", options: ["A. It arises from arachnoid cap cells", "B. Mostly presents as an intra-axial lesion", "C. It often exhibits a 'dural tail' sign"], answer: 1, explanation: "Meningiomas are classic EXTRA-axial tumors, growing from the meninges and compressing the brain inward." },
    { id: 42, topic: "MRI", text: "Which of the following statements is true regarding ischemia?", options: ["A. Acute ischemia appears hyperintense on DWI due to vasogenic edema", "B. Acute ischemia appears hyperintense on DWI due to cytotoxic edema"], answer: 1, explanation: "Acute ischemia depletes ATP, causing cell pump failure and cytotoxic edema (cellular swelling)." },
    { id: 43, topic: "MRI", text: "Which of the following is wrong regarding a primary brain tumor mass?", options: ["A. It can cause midline shift", "B. It causes primarily cytotoxic edema", "C. It can lead to blood-brain barrier breakdown"], answer: 1, explanation: "Tumors cause VASOGENIC edema (fluid leaking from leaky vessels into white matter extracellular space)." },
    { id: 44, topic: "MRI", text: "Identify the wrong match regarding pathology and edema type:", options: ["A. Brain Abscess: Vasogenic edema", "B. Acute Infarction: Vasogenic edema", "C. Tumor metastasis: Vasogenic edema"], answer: 1, explanation: "Acute infarction causes cytotoxic (intracellular) edema, not vasogenic." },
    { id: 45, topic: "MRI", text: "Which of the following is wrong regarding Spondylodiscitis?", options: ["A. Loss of vertical disc height excludes the disease", "B. It involves the intervertebral disc and adjacent vertebral endplates", "C. It is typically infectious in etiology"], answer: 0, explanation: "Infection destroys the disc, so loss of height SUPPORTS the diagnosis, it does not exclude it." },
    { id: 46, topic: "MRI", text: "Which of the following is wrong regarding spinal lesions?", options: ["A. Intramedullary lesions cause cord expansion", "B. Extramedullary intradural lesions cause cord expansion", "C. Extramedullary lesions displace the spinal cord"], answer: 1, explanation: "Extramedullary lesions grow outside the cord and COMPRESS/DISPLACE it, rather than expanding it." },
    { id: 47, topic: "MRI", text: "Which pattern matches an acute stroke on MRI?", options: ["A. Hypointense in DWI, Hyperintense in ADC", "B. Hyperintense in DWI, Hypointense in ADC", "C. Hyperintense in both DWI and ADC"], answer: 1, explanation: "True restricted diffusion is bright on DWI and dark on ADC. 'Bright on both' is just T2 shine-through." },

    // --- CHEST X-RAY ---
    { id: 48, topic: "Chest X-Ray", text: "Wrong about lobar pneumonia:", options: ["A. Lower lobe obliterate diaphragm", "B. Upper left lobe may obliterate left heart border", "C. Middle right lobe obliterate right heart border", "D. Inferior left lobe obliterates descending aorta", "E. Right middle lobe pneumonia is bounded inferiorly by horizontal fissure"], answer: 4, explanation: "RML is bounded SUPERIORLY by the horizontal minor fissure, and inferiorly by the oblique fissure." },
    { id: 49, topic: "Chest X-Ray", text: "In supine position X-ray which is wrong?", options: ["A. Heart size is exaggerated", "B. Diaphragm will be higher", "C. Prominent upper zone vessels", "D. Pleural fluid will accumulate posteriorly and give a decreased density to the hemithorax", "E. A pneumothorax will lie anteriorly"], answer: 3, explanation: "Posterior fluid layering increases x-ray absorption, resulting in INCREASED density (opacity/whiteness)." },
    { id: 50, topic: "Chest X-Ray", text: "Wrong about hilum in chest X-ray:", options: ["A. The left hilum is higher than the right because left main bronchus arches over left pulmonary artery", "B. Normally symmetrical", "C. Caused by pulmonary arteries and veins", "D. Prominent in pulmonary hypertension", "E. Can be pulled upwards or downwards by collapse"], answer: 0, explanation: "The left pulmonary ARTERY arches OVER the left main bronchus, making the left hilum higher." },
    { id: 51, topic: "Chest X-Ray", text: "All of the following cause a radiolucent hemithorax except:", options: ["A. PE", "B. Small lung", "C. Mastectomy", "D. Emphysema", "E. Rotation of patient"], answer: 4, explanation: "Rotation causes artifactual lucency changes, while the others physically alter tissue density to cause true/apparent radiolucency." },
    { id: 52, topic: "Chest X-Ray", text: "All the following are signs of collapse due to an opacification on the left upper lung border except:", options: ["A. Disappearance of the heart border", "B. Collapse of the lung to the left side", "C. Elevation of the left hemidiaphragm", "D. Obliteration of aorta", "E. Ill-defined opacity"], answer: 3, explanation: "The descending aorta is posterior and usually preserved in Left Upper Lobe collapse (silhouetted by LLL)." },
    { id: 53, topic: "Chest X-Ray", text: "Which of the following is true about chest x ray:", options: ["A. 8 pairs is the number of true ribs", "B. Retrocardiac area is considered one of the hidden areas", "C. Cardiothoracic ratio in adults is < 0.6", "D. Right hilum is higher than the left", "E. Right contour of heart is made by right ventricle"], answer: 1, explanation: "The retrocardiac area easily hides lung masses. Right contour is Right Atrium, CTR < 0.5, Left hilum is higher." },
    { id: 54, topic: "Chest X-Ray", text: "Wrong About airway disease:", options: ["A. Pneumothorax causes ipsilateral flattening of diaphragm", "B. Large pneumothorax can obliterate the costophrenic angle", "C. CT is better in detecting air bronchogram", "D. CT can detect small amount of air in pleura"], answer: 1, explanation: "Fluid (pleural effusion) obliterates the costophrenic angle. Air (pneumothorax) deepens it (deep sulcus sign)." },
    { id: 55, topic: "Chest X-Ray", text: "Wrong about air bronchogram:", options: ["A. Common in pulmonary edema", "B. Common in pneumonia", "C. Associated with a lesion", "D. Normally visible in 10% of adults"], answer: 3, explanation: "Air bronchograms are pathological signs of alveolar filling (consolidation). They are never visible in healthy lungs." },
    { id: 56, topic: "Chest X-Ray", text: "About chest x-ray which is wrong?", options: ["A. Right heart border is in contact with right middle lobe", "B. Upper most part of the right heart border is in contact with upper lobe", "C. Aortic notch is in posterior mediastinum", "D. Left heart border is in contact with left lower lobe"], answer: 3, explanation: "The left heart border is in contact with the Lingula (which is part of the Left Upper Lobe)." },
    { id: 57, topic: "Chest X-Ray", text: "Tension pneumothorax, wrong:", options: ["A. Pleural line on X-ray", "B. Absent lung making ipsilateral", "C. Horizontal hemidiaphragm ipsilateral", "D. Mediastinum shift to the ipsilateral side"], answer: 3, explanation: "Massive pressure in a tension PTX pushes the mediastinum AWAY to the CONTRALATERAL side." },
    { id: 58, topic: "Chest X-Ray", text: "In chest X-ray, one is wrong:", options: ["A. Right dome of diaphragm is higher than left", "B. Minor fissure appears in anterior Part of 4th space", "C. PA X-ray is better than AP", "D. Right hilum is higher than the left"], answer: 3, explanation: "Left hilum is higher because the left pulmonary artery arches over the left bronchus." },
    { id: 59, topic: "Chest X-Ray", text: "All cause bilateral small lung except:", options: ["A. Consolidation", "B. Bowel distension", "C. Suboptimal inspiration", "D. Obesity"], answer: 0, explanation: "Consolidation fills alveoli with pus/fluid but does NOT cause volume loss (collapse)." },
    { id: 60, topic: "Chest X-Ray", text: "Wrong about CXR:", options: ["A. Typically its PA view with full expiratory effort", "B. Distance between machine and film is 150-200 cm", "C. Heart size is exaggerated on AP view"], answer: 0, explanation: "Standard CXRs demand full INSPIRATORY effort to maximize lung visibility." },
    { id: 61, topic: "Chest X-Ray", text: "A chest x-ray showed an opacity silhouetting the left heart border, diaphragm is clearly seen. Which lobe is affected?", options: ["A. Middle right lobe", "B. Lower left lobe", "C. Whole left lung", "D. Upper left lobe"], answer: 3, explanation: "The lingula (part of LUL) touches the left heart border. The clear diaphragm means the LLL is spared." },
    { id: 62, topic: "Chest X-Ray", text: "Regarding CXR physics, which of the following is true:", options: ["A. Radiolucent object stops x ray beams", "B. Radiolucency is black on chest x ray", "C. Radio opaque allows that x ray beam to pass", "D. Contrast appears radiolucent on x ray"], answer: 1, explanation: "Radiolucent objects (like air) let x-rays pass through easily, striking the film and turning it black." },
    { id: 63, topic: "Chest X-Ray", text: "Wrong About silhouetting:", options: ["A. If middle lobe pneumonia, rt heart border is erased.", "B. If middle lobe pneumonia, lower surface will be horizontal fissure", "C. If left upper pneumonia, left heart border will be silhouetted."], answer: 1, explanation: "The horizontal fissure is the SUPERIOR boundary of the right middle lobe, not inferior." },
    { id: 64, topic: "Chest X-Ray", text: "Wrong about chest imaging:", options: ["A. CXR can view nodules <5mm", "B. Mediastinal window is better than lung window in viewing heart", "C. Spiral CT is the imaging modality of choice for PE"], answer: 0, explanation: "CXR cannot reliably resolve nodules smaller than 5-8mm; a CT is required." },
    { id: 65, topic: "Chest X-Ray", text: "About chest x-ray which is wrong?", options: ["A. PA and lateral views are the routine", "B. On lateral view, you see all right hemidiaphragm", "C. On lateral view, you can't see the anterior part of left hemidiaphragm"], answer: 1, explanation: "Overlapping structures often obscure parts of the diaphragm on a lateral view." },
    { id: 66, topic: "Chest X-Ray", text: "Collapse of the right upper lobe of the lung causes all except:", options: ["A. Rt hilum upward", "B. Rt horizontal fissure upward", "C. Rt bronchus to the contralateral side"], answer: 2, explanation: "Volume loss (collapse) pulls structures TOWARD the affected side (ipsilaterally)." },
    { id: 67, topic: "Chest X-Ray", text: "Collapse of right upper lobe, which is wrong?", options: ["A. Right hilum is higher", "B. Right hemidiaphragm is higher", "C. Shift of mediastinum to the left"], answer: 2, explanation: "Again, volume loss pulls the mediastinum ipsilaterally (to the right), not the left." },
    { id: 68, topic: "Chest X-Ray", text: "All are radiological signs that favors cancer of the bronchus except:", options: ["A. Peripheral calcified nodule", "B. Lymphangitis carcinomatosis", "C. Hilar LN"], answer: 0, explanation: "Dense calcification in a peripheral nodule (e.g., popcorn) is classically a sign of a benign granuloma or hamartoma." },
    { id: 69, topic: "Chest X-Ray", text: "All will cause diffuse nodular chest x-ray except:", options: ["A. Wegener's granulomatosis", "B. Sarcoidosis"], answer: 0, explanation: "Wegener's causes larger cavitating masses, while Sarcoidosis causes fine reticulonodular infiltrates." },
    { id: 70, topic: "Chest X-Ray", text: "Wrong about CXR:", options: ["A. In AP cardiac size is exaggerated", "B. Easy to do in 5 years old child"], answer: 1, explanation: "Young children cannot reliably follow breath-holding commands for full inspiratory films." },
    { id: 71, topic: "Chest X-Ray", text: "Wrong about tension pneumothorax:", options: ["A. Contralateral widening of intercostal spaces"], answer: 0, explanation: "Tension PTX causes IPSILATERAL widening of intercostal spaces due to hyperinflation on the affected side." },
    { id: 72, topic: "Chest X-Ray", text: "Wrong about pleural effusion:", options: ["A. Visible pleural edge"], answer: 0, explanation: "A visible visceral pleural edge is the hallmark of a Pneumothorax, not an effusion (which shows a fluid meniscus)." },
    { id: 73, topic: "Chest X-Ray", text: "Lowest attenuation and highest penetrance in chest X ray in:", options: ["A. Lung alveoli"], answer: 0, explanation: "Air in alveoli lacks density to stop x-rays, allowing total penetrance." },
    { id: 74, topic: "Chest X-Ray", text: "Wrong about pleural effusion:", options: ["A. Usually affect the costophrenic angles and do not affect the hemidiaphragm"], answer: 0, explanation: "Pleural effusions absolutely affect and obscure/silhouette the hemidiaphragm." },
    { id: 75, topic: "Chest X-Ray", text: "Wrong about chest x-ray:", options: ["A. Hila contain blood vessels and lymph nodes"], answer: 0, explanation: "Normal lymph nodes are NOT radiographically visible on a standard CXR unless pathologically enlarged." },
    { id: 76, topic: "Chest X-Ray", text: "Wrong about middle lobe collapse:", options: ["A. Lung volume is unchanged"], answer: 0, explanation: "Collapse (atelectasis) means lung volume is inherently decreased." },
    { id: 77, topic: "Chest X-Ray", text: "Pneumoperitoneum, which is wrong:", options: ["A. Best modality is standing upright x-ray"], answer: 0, explanation: "While erect CXR is standard initial imaging, the absolute MOST sensitive modality for free air is a CT scan." },

    // --- GI RADIOLOGY ---
    { id: 78, topic: "GI Radiology", text: "Which is false about Crohn's disease?", options: ["A. Skip lesions", "B. Most common presentation in terminal ileum", "C. Most common string sign in terminal ileum", "D. Cause mesenteric adenopathy", "E. Age of onset is 15-30"], answer: 3, explanation: "Massive adenopathy mimicking appendicitis is typical of Yersinia, not a primary defining feature of Crohn's." },
    { id: 79, topic: "GI Radiology", text: "Striated kidney in IVU in all Except:", options: ["A. Polycystic kidney", "B. Medullary spongiosis", "C. Renal vein thrombosis", "D. Renal artery stenosis", "E. Acute nephritis"], answer: 3, explanation: "Renal artery stenosis causes global ischemia, resulting in a uniformly small, smooth kidney without striations." },
    { id: 80, topic: "GI Radiology", text: "Regarding diaphragmatic hernia, one is wrong:", options: ["A. Morgagni hernia is more common on the rt side", "B. Bochdalek hernia is more common on the rt side", "C. Sliding hernia is more common than rolling type", "D. Ba swallow can identify the hernia", "E. Plain X-ray can identify the hernia"], answer: 1, explanation: "Bochdalek hernias occur posterolaterally and are predominantly LEFT-sided. (BochdaLek = Left)." },
    { id: 81, topic: "GI Radiology", text: "All are causes of false positives in diuretic renography except:", options: ["A. Poor hydration", "B. Bladder outflow obstruction", "C. Poor renal function", "D. Huge collecting system", "E. Non-fasting state"], answer: 4, explanation: "A non-fasting state does not significantly alter the mechanical clearance parameters of the kidneys." },
    { id: 82, topic: "GI Radiology", text: "All true regarding renal study except:", options: ["A. DTPA extraction efficiency of 40 percent", "B. DMSA coefficient extraction is 10%", "C. DTPA represents filtration", "D. MAG3 represents secretion", "E. DMSA is used for calyceal system evaluation"], answer: 0, explanation: "DTPA purely measures GFR and has an extraction fraction of only ~20%. MAG3 is 40-50%." },
    { id: 83, topic: "GI Radiology", text: "Wrong about Ulcerative colitis:", options: ["A. Strictures are common", "B. Slightly More common in males", "C. 95% in the rectosigmoid area", "D. Radiation ileitis is a differential diagnosis", "E. Has malignant potential in many years"], answer: 0, explanation: "Strictures are rare in UC; if found, there is a very high suspicion for colorectal cancer. Strictures are common in Crohn's." },
    { id: 84, topic: "GI Radiology", text: "True about Abdominal aorta:", options: ["A. Bifurcate of Aorta at the level of L3", "B. Superior mesenteric artery arise at the level of L1", "C. Celiac trunk arise at the level of T11", "D. Splenic artery is a branch of SMA", "E. None of the above"], answer: 1, explanation: "SMA arises at L1. Aorta bifurcates at L4. Celiac is T12. Splenic is branch of celiac." },
    { id: 85, topic: "GI Radiology", text: "Which of the following is false about diverticulosis:", options: ["A. Saclike outpouchings", "B. Very common in elderly", "C. LIF pain is common symptom", "D. Commonest in the cecum", "E. Diverticulum has a narrow neck"], answer: 3, explanation: "Most common in the sigmoid colon (left side), which has the smallest diameter and highest pressure." },
    { id: 86, topic: "GI Radiology", text: "Wrong about abdominal imaging?", options: ["A. Free gas can normally be seen 7 days after laparotomy", "B. Free gas in bile tract can indicate a fistula", "C. Most common cause of pathological pneumoperitoneum is ruptured ulcer", "D. Diameter of normal colon should be less than 5 cm"], answer: 3, explanation: "3-6-9 Rule: Normal colon can be up to 6 cm. Cecum up to 9 cm. 5 cm is too restrictive." },
    { id: 87, topic: "GI Radiology", text: "Which is false about sigmoid volvulus?", options: ["A. Coffee bean sign", "B. Lateral border overlap liver shadow", "C. Apex under right hemidiaphragm", "D. Chronic volvulus is associated with shouldering edges"], answer: 3, explanation: "Shouldering edges ('apple-core') is the classic sign of colorectal carcinoma, not volvulus ('bird beak')." },
    { id: 88, topic: "GI Radiology", text: "Liver hemangioma false:", options: ["A. Hypointense signal on T2", "B. Hyperechoic signal on U/S", "C. Most common benign liver tumor", "D. Mostly eccentric and subcapsular"], answer: 0, explanation: "Hemangiomas are filled with slow-flowing blood, making them very bright (HYPERintense) on T2 ('lightbulb sign')." },
    { id: 89, topic: "GI Radiology", text: "Diverticulosis, which is wrong?", options: ["A. Patients presenting with obstruction need surgery", "B. Fistula commonly to vagina and bladder", "C. 20% develop diverticulitis", "D. Usually with pain and abdominal tenderness"], answer: 3, explanation: "Uncomplicated diverticulosis is classically painless or presents with painless bleeding. Diverticulitis causes pain." },
    { id: 90, topic: "GI Radiology", text: "Wrong About contrasted GI imaging:", options: ["A. Water contrast has better mucosal lining than barium contrast", "B. Water soluble low osmolality is the ideal contrast", "C. Barium is contraindicated in perforation"], answer: 0, explanation: "Barium sulfate is highly dense and provides far superior mucosal coating compared to water-soluble contrast." },
    { id: 91, topic: "GI Radiology", text: "A patient came with urea 10 XNL, all are initial workup except:", options: ["A. US", "B. IVP", "C. Plain abdomen", "D. Hand radiography"], answer: 3, explanation: "Hand radiography checks for secondary hyperparathyroidism in chronic failure, it is not an initial workup for acute urea elevation." },
    { id: 92, topic: "GI Radiology", text: "Not true about barium enema:", options: ["A. Safe to use in perforation", "B. Water insoluble material", "C. Causes constipation and impaction", "D. Cheap"], answer: 0, explanation: "Barium causes severe chemical peritonitis if it leaks into the abdomen. It is absolutely contraindicated in perforation." },
    { id: 93, topic: "GI Radiology", text: "Sudden onset of vertigo without hearing loss for 3 days duration, resolved on its own:", options: ["A. Labyrinthitis", "B. Vestibular neuritis", "C. Meniere", "D. BPPV"], answer: 1, explanation: "Vestibular neuritis presents as acute, severe, continuous vertigo lasting days without hearing loss." },
    { id: 94, topic: "GI Radiology", text: "Barium contrast is absolutely contraindicated in:", options: ["A. Perforated Duodenal ulcer"], answer: 0, explanation: "Barium leakage causes severe peritonitis." },
    { id: 95, topic: "GI Radiology", text: "The most specific test to detect gallstones is:", options: ["A. US (Ultrasound)"], answer: 0, explanation: "RUQ Ultrasound is the gold standard, showing echogenic foci with posterior acoustic shadowing." },
    { id: 96, topic: "GI Radiology", text: "Regarding Ba enema, one is wrong:", options: ["A. Contraindicated in intestinal obstruction"], answer: 0, explanation: "Perforation is the absolute contraindication. Ba enemas are sometimes carefully used to find the level of obstruction." },
    { id: 97, topic: "GI Radiology", text: "Wrong in abdomen CT:", options: ["A. Pancreatitis appears as a hyperdense area"], answer: 0, explanation: "Acute pancreatitis shows HYPOdense edema/fluid." },
    { id: 98, topic: "GI Radiology", text: "Wrong in UC barium enema:", options: ["A. Normal segment between two affected areas"], answer: 0, explanation: "Normal segments (skip lesions) are pathognomonic for Crohn's Disease. UC is continuous." },
    { id: 99, topic: "GI Radiology", text: "Wrong in Duodenal ulcer:", options: ["A. Double contrast is superior to endoscopy in dx"], answer: 0, explanation: "Endoscopy is superior because it allows direct visualization, checking bleeding, and taking biopsies." },
    { id: 100, topic: "GI Radiology", text: "Wrong pancreas anatomy:", options: ["A. Uncinate in front of mesenteric vessels"], answer: 0, explanation: "The uncinate process passes POSTERIOR to the Superior Mesenteric Artery and Vein." },
    { id: 101, topic: "GI Radiology", text: "Wrong about small bowel folds:", options: ["A. Mucosal folds increase in number as we go towards ileum"], answer: 0, explanation: "Folds are thickest/numerous in the jejunum and progressively decrease in the ileum." },

    // --- MAMMOGRAPHY ---
    { id: 102, topic: "Mammography", text: "Recent mammogram showed an oval well-defined mass that is unchanged since 2016. The most appropriate BI-RADS classification is:", options: ["A. BI-RADS 2", "B. BI-RADS 3", "C. BI-RADS 4", "D. BI-RADS 5", "E. BI-RADS 1"], answer: 0, explanation: "A well-defined mass stable for >2-3 years is definitively benign (BI-RADS 2)." },
    { id: 103, topic: "Mammography", text: "The most likely mammographic appearance of a biopsy proven fibroadenoma is:", options: ["A. Oval well defined mass", "B. Cluster of pleomorphic microcalcifications", "C. Area of architectural distortion", "D. Microlobulated mass", "E. An ill-defined rounded mass"], answer: 0, explanation: "Fibroadenomas are classic benign tumors presenting as solid, oval, circumscribed masses." },
    { id: 104, topic: "Mammography", text: "A mammogram of a woman who had previous breast surgery and radiotherapy showed calcifications at operative site assigned BI-RADS 2. Morphology?", options: ["A. Popcorn calcifications", "B. Fine pleomorphic microcalcifications", "C. Egg shell calcifications", "D. Rod like calcifications", "E. Fine linear microcalcifications"], answer: 2, explanation: "Post-surgical trauma causes fat necrosis/oil cysts, which form benign peripheral rim or 'egg shell' calcifications." },
    { id: 105, topic: "Mammography", text: "Calcified ring on mammogram:", options: ["A. Cyst", "B. Fat necrosis", "C. Fibroadenoma"], answer: 0, explanation: "A calcified ring (rim calcification) is a hallmark of simple cysts or fat necrosis (oil cysts). Fibroadenomas have popcorn calcifications." },
    { id: 106, topic: "Mammography", text: "A women diagnosed with invasive ductal carcinoma, did mammogram after chemotherapy, revealed a round well-defined mass, what is the BIRADS:", options: ["A. 2", "B. 3", "C. 4", "D. 5", "E. 6"], answer: 4, explanation: "BI-RADS 6 is reserved strictly for known, already biopsy-proven malignancies." },
    { id: 107, topic: "Mammography", text: "A 25 year old woman did a mammogram, which revealed a fatty breast, an oval well defined isodense mass, what is the ACR and BIRADS:", options: ["A. ACR 1 BIRADS 3", "B. ACR 1 BIRADS 2", "C. ACR 2 BIRADS 2", "D. ACR 1 BIRADS 1", "E. ACR 4 BIRADS 2"], answer: 0, explanation: "Fatty breast is ACR 1. A new solid, well-defined mass is 'probably benign' (BI-RADS 3) requiring 6-month follow-up." },
    { id: 108, topic: "Mammography", text: "If you found 10 mm mass on mammogram, which of the following is a feature of malignancy:", options: ["A. Central lucency", "B. Peripheral part of fat density", "C. Clustered coarse calcifications", "D. Irregular posterior border", "E. Previous normal mammogram"], answer: 3, explanation: "Irregular borders indicate invasion. Coarse calcifications and fat are benign features." },
    { id: 109, topic: "Mammography", text: "If you found 10 mm mass on mammogram, which of the following is a feature of malignancy:", options: ["A. Hyper density", "B. Peripheral part of fat density", "C. Coarse calcification", "D. Smooth border", "E. Previous normal mammogram"], answer: 0, explanation: "Hyperdense masses pack cells tightly, making them highly suspicious. Fat and coarse calcifications are benign." },
    { id: 110, topic: "Mammography", text: "All are against malignancy except:", options: ["A. History of extramammary malignancy", "B. Fat containing", "C. Multiple", "D. Total lucency", "E. Halo"], answer: 0, explanation: "Prior cancer INCREASES the risk of metastasis to the breast. The other choices are classic benign signs." },
    { id: 111, topic: "Mammography", text: "Recent mammogram showed an oval well-defined mass. The most appropriate BIRADS classification is:", options: ["A. 1", "B. 2", "C. 3", "D. 4", "E. 5"], answer: 1, explanation: "Standard benign presentation defaults to BI-RADS 2 (Benign finding) without further context of prior films." },
    { id: 112, topic: "Mammography", text: "Mammogram of a woman with previous breast surgery/radiotherapy showed calcifications at operative site assigned BI-RADS 2. Morphology?", options: ["A. Popcorn calcifications", "B. Fine pleomorphic microcalcifications", "C. Egg shell calcifications", "D. Rod like calcifications"], answer: 2, explanation: "Eggshell calcifications follow trauma/surgery due to fat necrosis." },
    { id: 113, topic: "Mammography", text: "Patient suffered a traumatic breast injury, mammography will most likely show:", options: ["A. Rod calcifications", "B. Fine linear branching calcifications", "C. Eggshell calcifications", "D. Dystrophic"], answer: 2, explanation: "Trauma causes fat necrosis, leading to saponification and peripheral rim 'eggshell' calcifications." },
    { id: 114, topic: "Mammography", text: "44yo female regular mammography. Recent mammo showed a mass unchanged since 2020. Which is true?", options: ["A. Repeat mammogram with the same screening interval", "B. Consult a doctor urgently", "C. Repeat the mammogram every 6 months", "D. Do surgery"], answer: 0, explanation: "Unchanged for 2-3 years = BI-RADS 2 (Benign). Return to routine screening." },
    { id: 115, topic: "Mammography", text: "All are asymmetrical breast tissue on mammogram except:", options: ["A. Fibroma", "B. Lipoma", "C. Breast parenchyma"], answer: 2, explanation: "Normal breast parenchyma is naturally symmetrical. Tumors/lipomas create asymmetrical focal densities." },
    { id: 116, topic: "Mammography", text: "All good modalities for detection of breast lesions except:", options: ["A. MRI", "B. US", "C. CT"], answer: 2, explanation: "CT involves high radiation and has poor soft-tissue resolution for subtle breast lesions compared to MRI/US/Mammo." },
    { id: 117, topic: "Mammography", text: "Which of the following is would be classified as BIRAD 4:", options: ["A. Eggshell calcifications", "B. Cluster pleomorphic calcifications", "C. Dystrophic calcification"], answer: 1, explanation: "Clustered pleomorphic calcifications are highly suspicious for DCIS (malignancy)." },
    { id: 118, topic: "Mammography", text: "26y/o lady presented with suspected breast mass the best imaging?", options: ["A. Mammogram", "B. US"], answer: 1, explanation: "Under 30 years old, dense breast tissue limits mammography. US is the best initial test." },
    { id: 119, topic: "Mammography", text: "Well defined breast lesion, coarse calcification. BIRAD?", options: ["A. BIRADS 2"], answer: 0, explanation: "Classic features of a degenerating fibroadenoma (benign)." },
    { id: 120, topic: "Mammography", text: "Malignant calcifications?", options: ["A. Linear / Branching"], answer: 0, explanation: "Casting calcifications filling the ducts are highly predictive of malignancy." },
    { id: 121, topic: "Mammography", text: "Needle shaped thick calcification, pointing to nipple?", options: ["A. Plasma cell mastitis"], answer: 0, explanation: "Classic for secretory disease/plasma cell mastitis, which is benign." },
    { id: 122, topic: "Mammography", text: "Not a cause of round lesion on mammogram:", options: ["A. Carcinoma"], answer: 0, explanation: "Carcinomas present as irregular, microlobulated, or spiculated, not perfectly round." },
    { id: 123, topic: "Mammography", text: "Feature with most malignant potential:", options: ["A. Notch and lobar edge"], answer: 0, explanation: "Microlobulation and notching strongly predict malignancy over smooth edges." },
    { id: 124, topic: "Mammography", text: "A round, well-defined, radiolucent mass with enlarged axillary lymph nodes with a fatty hila, BIRADS category:", options: ["A. BIRADS 2"], answer: 0, explanation: "Radiolucent = fat (benign lipoma). Fatty hilum in node = normal healthy node." },
    { id: 125, topic: "Mammography", text: "Microlobulated margins predict:", options: ["A. BI-RADS 4"], answer: 0, explanation: "Suspicious for malignancy." },
    { id: 126, topic: "Mammography", text: "Radiolucent and oval lesion:", options: ["A. BI-RADS 2"], answer: 0, explanation: "Radiolucent means it contains fat (like a lipoma), which is definitively benign." },
    { id: 127, topic: "Mammography", text: "History of breast trauma shows:", options: ["A. Egg-shell appearance"], answer: 0, explanation: "Fat necrosis leads to calcified oil cysts." },

    // --- INTERVENTIONAL RADIOLOGY ---
    { id: 128, topic: "Interventional Radiology", text: "The most sensitive sonographic/doppler sign to detect acute venous thrombosis is?", options: ["A. Presence of collaterals", "B. Non-compressibility", "C. Skin changes and cellulitis", "D. Small caliber of the vein", "E. Increased flow"], answer: 1, explanation: "A normal vein compresses completely under the ultrasound probe. A thrombus prevents compression." },
    { id: 129, topic: "Interventional Radiology", text: "All are required in U/S guided liver biopsy except:", options: ["A. General anaesthesia", "B. IV lines", "C. Consent", "D. Coagulation studies", "E. Patient fasting"], answer: 0, explanation: "Percutaneous biopsies are performed under local anesthesia (lidocaine), general anesthesia is not required." },
    { id: 130, topic: "Interventional Radiology", text: "All are true regarding arterial occlusive diseases except:", options: ["A. Thrombi have meniscal edge", "B. 90% due to atherosclerosis", "C. Embolic mostly cardiac in origin", "D. Embolism stick at bifurcation", "E. Thrombotic are less dangerous than embolic"], answer: 0, explanation: "Emboli have a sharp, 'meniscal' cutoff. Thrombi have a tapered, irregular edge." },
    { id: 131, topic: "Interventional Radiology", text: "Best site to place for puncture in angiography for visualizing brain circulation:", options: ["A. Directly in carotid", "B. Axillary artery", "C. Femoral artery", "D. Brachial artery", "E. Radial artery"], answer: 2, explanation: "The common femoral artery provides a large, compressible access point with a straight path up the aorta." },
    { id: 132, topic: "Interventional Radiology", text: "Which one of the following is true?", options: ["A. Conventional venography is modality of choice for upper limb DVT", "B. DSA is used to visualize blood vessels by eliminating bones", "C. MRI has a major role in IR", "D. Hypo-vascular tumors benefit from embolization", "E. Percutaneous nephrostomy is C/I in pyelonephritis"], answer: 1, explanation: "Digital Subtraction Angiography subtracts a pre-contrast image to perfectly remove bone and highlight vessels." },
    { id: 133, topic: "Interventional Radiology", text: "All are indications to do an arteriogram except:", options: ["A. VTE", "B. Blood vessel disease", "C. Arterial supply of tumor", "D. Define anatomy before surgery", "E. Detect source of GI bleeding"], answer: 0, explanation: "Venous Thromboembolism (VTE) requires venous imaging (US or CT venography), not an arteriogram." },
    { id: 134, topic: "Interventional Radiology", text: "All are true about abdominal aortic aneurysm except:", options: ["A. 90% are suprarenal", "B. 66% extend to common iliac", "C. Can be visualized by ultrasound", "D. >3 cm", "E. Can rupture retroperitoneally"], answer: 0, explanation: "Over 90% of Abdominal Aortic Aneurysms are INFRArenal (below the kidneys)." },
    { id: 135, topic: "Interventional Radiology", text: "All are indications for IVC filter except?", options: ["A. All trauma patients prophylactically", "B. Contraindication for anticoagulant", "C. VTE while on anticoagulant", "D. Bleeding while on anticoagulant"], answer: 0, explanation: "They carry thrombosis risks and are used judiciously, not universally for all trauma patients." },
    { id: 136, topic: "Interventional Radiology", text: "Wrong about abdominal aneurysms?", options: ["A. AP diameter >3cm is an aneurysm", "B. Intimal flap is a sign of dissection", "C. Wall irregularity is a sign of dissection", "D. Most common site is infrarenal"], answer: 2, explanation: "Wall irregularity indicates atherosclerosis/mural thrombus. An intimal flap is the pathognomonic sign of dissection." },
    { id: 137, topic: "Interventional Radiology", text: "Which is false about angiogram?", options: ["A. Femoral aneurysm is a relative contraindication", "B. Left femoral artery is technically more accessible", "C. Most frequently used to reach aorta is femoral artery", "D. Contralateral access used if pathology on one side"], answer: 1, explanation: "The RIGHT femoral artery is technically more accessible for right-handed operators." },
    { id: 138, topic: "Interventional Radiology", text: "Wrong about femoral catheterization:", options: ["A. Femoral artery is medial to femur", "B. Easily accessible", "C. Low complication"], answer: 0, explanation: "It crosses anteriorly over the femoral head/neck and is lateral to the femoral vein (NAVEL)." },
    { id: 139, topic: "Interventional Radiology", text: "Wrong about angioplasty prognosis:", options: ["A. Better in stenosis than occlusion", "B. Better in distal vessels", "C. Better in larger vessels"], answer: 1, explanation: "Small distal vessels (like tibials) restenose rapidly. Larger proximal vessels have excellent patency." },
    { id: 140, topic: "Interventional Radiology", text: "True about arteriograms:", options: ["A. Intimal flap is a radiological sign of a dissection", "B. Collaterals can be seen in acute VTE", "C. Thrombus appears as meniscus sign"], answer: 0, explanation: "The intimal flap separating true/false lumens is the defining feature of dissection." },
    { id: 141, topic: "Interventional Radiology", text: "CT guided biopsy is used in:", options: ["A. Lung abscess", "B. Para-aortic L.N", "C. Both A & B"], answer: 2, explanation: "US cannot penetrate air (lung) or bowel gas (para-aortic). CT provides excellent guidance." },
    { id: 142, topic: "Interventional Radiology", text: "Endovascular repair which is wrong?", options: ["A. Decreased hospital stay", "B. Generalized Anesthesia in all patients"], answer: 1, explanation: "EVAR often relies on local or regional anesthesia to reduce cardiopulmonary stress." },
    { id: 143, topic: "Interventional Radiology", text: "Wrong about IVC filter:", options: ["A. May lead to thrombosis", "B. Position is supra renal"], answer: 1, explanation: "IVC filters are placed INFRArenally to avoid filter thrombosis occluding the renal veins." },
    { id: 144, topic: "Interventional Radiology", text: "US-guided biopsy is not chosen over CT guidance in:", options: ["A. Lung biopsy"], answer: 0, explanation: "Air in lungs scatters US waves, blocking visualization. CT is required." },
    { id: 145, topic: "Interventional Radiology", text: "Wrong about interventional radiology:", options: ["A. Agitated patient is suitable for a digital subtraction angiography"], answer: 0, explanation: "DSA subtracts images. If the patient moves, misregistration artifacts ruin the image." },
    { id: 146, topic: "Interventional Radiology", text: "A patient has reversible, large ischemia in lateral wall on perfusion study, normal treadmill ECG, next step:", options: ["A. Perform catheterization"], answer: 0, explanation: "High risk requires anatomic visualization via coronary angiography (cath)." },
    { id: 147, topic: "Interventional Radiology", text: "Technique used in interventional radiology:", options: ["A. Seldinger"], answer: 0, explanation: "The standard technique using a guidewire to safely guide a catheter into a vessel." },

    // --- MSK ---
    { id: 148, topic: "MSK", text: "Regarding classical features of non-ossifying fibroma, one is false:", options: ["A. Split cortex sign", "B. Well defined", "C. Benign", "D. Cortical destruction", "E. Peripheral sclerosis"], answer: 3, explanation: "NOFs are benign and may thin the cortex, but do NOT cause frank cortical destruction (malignant sign)." },
    { id: 149, topic: "MSK", text: "All are radiological signs of malignant bone disease except:", options: ["A. Wide sclerotic rim", "B. Endosteal cortical reaction", "C. Soft tissue extension", "D. Wide transition zone", "E. Periosteal reaction"], answer: 0, explanation: "A wide sclerotic rim indicates slow growth, allowing bone to react. It's a classic benign sign." },
    { id: 150, topic: "MSK", text: "Ewing sarcoma, which is wrong:", options: ["A. Lesion is permeative destructive", "B. Periosteal reaction", "C. Endocortical reaction", "D. Easily differentiated from acute osteomyelitis by X-ray", "E. Diaphyseal"], answer: 3, explanation: "Ewing sarcoma and acute osteomyelitis present identically (fever, permeative lesion, periosteal reaction) and are notoriously hard to differentiate." },
    { id: 151, topic: "MSK", text: "All will cause opacities on skull x-ray except:", options: ["A. Histiocytosis", "B. Irradiation", "C. Multiple myeloma", "D. Mets", "E. Spherocytosis"], answer: 2, explanation: "Multiple myeloma secretes osteoclast activators, causing purely lytic (radiolucent) 'punched-out' lesions without sclerosis." },
    { id: 152, topic: "MSK", text: "Not in seronegative inflammatory arthritis:", options: ["A. Distal pattern", "B. Non-Erosive", "C. Uniform joint space loss", "D. Osteopenia", "E. Proliferation"], answer: 1, explanation: "Seronegative spondyloarthropathies (like Psoriatic) are highly erosive (e.g., 'pencil-in-cup' deformity)." },
    { id: 153, topic: "MSK", text: "Not found in ankylosing spondylitis:", options: ["A. Bamboo spine", "B. Shiny corner sign", "C. Rugger Jersey", "D. Dagger sign", "E. Trolley track sign"], answer: 2, explanation: "Rugger Jersey spine is a sign of renal osteodystrophy / secondary hyperparathyroidism." },
    { id: 154, topic: "MSK", text: "Not found in hyperparathyroidism:", options: ["A. Bamboo spine", "B. Subperiosteal bone resorption", "C. Salt-pepper skull appearance", "D. Rugger Jersey", "E. Calcification in soft tissue"], answer: 0, explanation: "Bamboo spine is inflammatory (Ankylosing Spondylitis), not metabolic." },
    { id: 155, topic: "MSK", text: "False about radiological findings in Osteoarthritis:", options: ["A. Bilateral", "B. More prominent at lateral sides", "C. Osteophytes", "D. Geodes", "E. Space narrowing"], answer: 1, explanation: "In weight-bearing joints (knees), OA is predominantly medial due to the normal mechanical weight axis." },
    { id: 156, topic: "MSK", text: "Which of the following differences favors osteosarcoma over Ewing sarcoma in a 16 year old child?", options: ["A. Pathological fractures", "B. Metaphyseal in site", "C. Permeative reaction", "D. Lamellated periosteal reaction", "E. Absence of bone matrix"], answer: 1, explanation: "Osteosarcoma predominantly arises in the metaphysis. Ewing arises in the diaphysis." },
    { id: 157, topic: "MSK", text: "One of these lesions is intramedullary:", options: ["A. Chondromyxoid fibroma", "B. Enchondroma", "C. Osteoid osteoma", "D. GCT"], answer: 1, explanation: "Enchondromas are benign cartilaginous tumors growing centrally within the medullary cavity." },
    { id: 158, topic: "MSK", text: "Inflammatory arthritis which is wrong:", options: ["A. Erosions", "B. Weight bearing joints", "C. Uniform joint space narrowing"], answer: 1, explanation: "Inflammatory arthritis typically targets non-weight bearing joints (MCPs, PIPs, wrists). OA targets weight-bearing ones." },
    { id: 159, topic: "MSK", text: "Acute osteomyelitis all true except:", options: ["A. Expands bone", "B. Rarefaction", "C. Reactive bone thickening"], answer: 2, explanation: "Reactive bone thickening (sclerosis/involucrum) takes months to develop, signifying CHRONIC osteomyelitis." },
    { id: 160, topic: "MSK", text: "Super scan not in:", options: ["A. Pulmonary osteodystrophy", "B. Osteomalacia", "C. Hyperparathyroidism"], answer: 0, explanation: "A superscan is seen in diffuse metabolic disease or metastasis, not pulmonary osteoarthropathy (linear uptake)." },
    { id: 161, topic: "MSK", text: "Wrong About seronegative arthritis imaging:", options: ["A. Trolley track sign is due to ossification of the posterior interspinous ligament", "B. Sclerosis of the vertebral corner is an early sign"], answer: 0, explanation: "Trolley track is facet joints. Interspinous ligament ossification is the 'dagger sign'." },
    { id: 162, topic: "MSK", text: "True about gout:", options: ["A. Punched out erosions", "B. Early joint narrowing"], answer: 0, explanation: "Gout has well-defined, punched-out erosions (Martel sign). Joint space is paradoxically preserved until late." },
    { id: 163, topic: "MSK", text: "Wrong about septic arthritis:", options: ["A. Symmetrical bilateral"], answer: 0, explanation: "Septic arthritis is almost exclusively acute and monoarticular. Symmetrical is Rheumatoid Arthritis." },
    { id: 164, topic: "MSK", text: "Wrong about osteosarcoma:", options: ["A. Diaphyseal"], answer: 0, explanation: "Osteosarcoma arises in the metaphysis." },
    { id: 165, topic: "MSK", text: "Wrong about non ossifying fibroma:", options: ["A. Majority need surgery"], answer: 0, explanation: "NOFs spontaneously regress and ossify; they almost never need surgery." },
    { id: 166, topic: "MSK", text: "Not a sign on inflammatory arthritis:", options: ["A. Periarticular osteosclerosis AND affects weight-bearing joints"], answer: 0, explanation: "Inflammatory causes osteoPENIA (hyperemia) and non-weight bearing joints." },
    { id: 167, topic: "MSK", text: "Tumor of epiphysis:", options: ["A. Giant cell tumor"], answer: 0, explanation: "GCTs characteristically extend all the way to the articular surface (epiphysis)." },

// --- APP STATE ---
let currentQuestions = [];
let currentQuestionIndex = 0;
let userAnswers = {}; // Map of questionId -> selectedOptionIndex
let topics = [...new Set(questions.map(q => q.topic))];

// --- DOM ELEMENTS ---
const appDiv = document.getElementById('app');

// --- RENDERING FUNCTIONS ---

function goHome() {
    renderHome();
}

function renderHome() {
    let topicCardsHTML = '';
    topics.forEach(topic => {
        const count = questions.filter(q => q.topic === topic).length;
        topicCardsHTML += `
            <div onclick="startQuiz('${topic}')" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:border-blue-500 hover:shadow-md cursor-pointer transition transform hover:-translate-y-1">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-gray-800">${topic}</h3>
                    <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded-full">${count} Qs</span>
                </div>
            </div>
        `;
    });

    const wrongAnswersCount = Object.keys(userAnswers).filter(id => {
        const q = questions.find(q => q.id == id);
        return q && userAnswers[id] !== q.answer;
    }).length;

    appDiv.innerHTML = `
        <div class="fade-in">
            <div class="text-center mb-10 mt-8">
                <h2 class="text-3xl font-extrabold text-gray-900 mb-4">Board Review Mastery</h2>
                <p class="text-gray-600 max-w-2xl mx-auto">Select a topic below, start a randomized comprehensive test, or review your previous mistakes.</p>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center mb-12">
                <button onclick="startQuiz('all')" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition flex items-center justify-center">
                    <i class="fa-solid fa-shuffle mr-2"></i> Randomize All Questions
                </button>
                ${wrongAnswersCount > 0 ? `
                <button onclick="startReview()" class="bg-rose-500 hover:bg-rose-600 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition flex items-center justify-center">
                    <i class="fa-solid fa-book-open mr-2"></i> Review Mistakes (${wrongAnswersCount})
                </button>
                ` : `
                <button disabled class="bg-gray-300 text-gray-500 font-semibold py-3 px-8 rounded-lg flex items-center justify-center cursor-not-allowed">
                    <i class="fa-solid fa-check mr-2"></i> No Mistakes to Review
                </button>
                `}
            </div>

            <h3 class="text-xl font-bold text-gray-800 mb-6 border-b pb-2">Topics</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                ${topicCardsHTML}
            </div>
        </div>
    `;
}

function startQuiz(topic) {
    if (topic === 'all') {
        // Shuffle all questions
        currentQuestions = [...questions].sort(() => Math.random() - 0.5);
    } else {
        currentQuestions = questions.filter(q => q.topic === topic);
    }
    currentQuestionIndex = 0;
    renderQuestion();
}

function startReview() {
    currentQuestions = questions.filter(q => {
        return userAnswers[q.id] !== undefined && userAnswers[q.id] !== q.answer;
    });
    if(currentQuestions.length === 0) {
        alert("No mistakes to review!");
        return;
    }
    currentQuestionIndex = 0;
    renderQuestion();
}

function selectOption(optionIndex) {
    const q = currentQuestions[currentQuestionIndex];
    if (userAnswers[q.id] !== undefined) return; // Prevent re-answering
    
    userAnswers[q.id] = optionIndex;
    renderQuestion();
}

function nextQuestion() {
    if (currentQuestionIndex < currentQuestions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
    } else {
        renderEndScreen();
    }
}

function prevQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
    }
}

function renderQuestion() {
    const q = currentQuestions[currentQuestionIndex];
    const isAnswered = userAnswers[q.id] !== undefined;
    const selectedAns = userAnswers[q.id];
    
    // Progress Bar
    const progressPct = ((currentQuestionIndex) / currentQuestions.length) * 100;

    let optionsHTML = '';
    q.options.forEach((opt, idx) => {
        let classes = "option-card border-2 border-gray-200 bg-white p-4 rounded-xl text-left font-medium text-gray-700 w-full flex items-center mb-3";
        let iconHTML = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 mr-3 flex-shrink-0 flex items-center justify-center"></div>`;

        if (isAnswered) {
            classes += " disabled";
            if (idx === q.answer) {
                classes = classes.replace("border-gray-200", "").replace("bg-white", "correct-answer font-bold");
                iconHTML = `<i class="fa-solid fa-circle-check text-green-500 text-xl mr-3"></i>`;
            } else if (idx === selectedAns) {
                classes = classes.replace("border-gray-200", "").replace("bg-white", "wrong-answer");
                iconHTML = `<i class="fa-solid fa-circle-xmark text-red-500 text-xl mr-3"></i>`;
            } else {
                classes += " opacity-50";
            }
        } else {
            classes += " hover:bg-gray-50 cursor-pointer";
        }

        optionsHTML += `
            <button class="${classes}" onclick="selectOption(${idx})" ${isAnswered ? 'disabled' : ''}>
                ${iconHTML}
                <span>${opt}</span>
            </button>
        `;
    });

    appDiv.innerHTML = `
        <div class="fade-in max-w-3xl mx-auto">
            <!-- Header & Progress -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-semibold text-blue-600 uppercase tracking-wider">${q.topic}</span>
                    <span class="text-sm text-gray-500 font-medium">Question ${currentQuestionIndex + 1} of ${currentQuestions.length}</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: ${progressPct}%"></div>
                </div>
            </div>

            <!-- Question Card -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 mb-6">
                <h2 class="text-xl md:text-2xl font-bold text-gray-900 mb-8 leading-snug">${q.text}</h2>
                <div class="flex flex-col">
                    ${optionsHTML}
                </div>
            </div>

            <!-- Explanation Box (Hidden until answered) -->
            ${isAnswered ? `
                <div class="bg-blue-50 border-l-4 border-blue-500 p-5 rounded-r-lg mb-6 fade-in shadow-sm">
                    <h4 class="font-bold text-blue-800 mb-1 flex items-center"><i class="fa-solid fa-lightbulb text-yellow-500 mr-2"></i>Explanation</h4>
                    <p class="text-gray-700 leading-relaxed">${q.explanation}</p>
                </div>
            ` : ''}

            <!-- Navigation Controls -->
            <div class="flex justify-between items-center mt-6">
                <button onclick="prevQuestion()" class="px-5 py-2.5 rounded-lg font-medium transition ${currentQuestionIndex === 0 ? 'text-gray-400 bg-gray-100 cursor-not-allowed' : 'text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 shadow-sm'}" ${currentQuestionIndex === 0 ? 'disabled' : ''}>
                    <i class="fa-solid fa-arrow-left mr-2"></i> Previous
                </button>

                <button onclick="nextQuestion()" class="px-6 py-2.5 rounded-lg font-bold transition text-white shadow-sm ${isAnswered ? 'bg-blue-600 hover:bg-blue-700' : 'bg-gray-300 cursor-not-allowed'}" ${!isAnswered ? 'disabled' : ''}>
                    ${currentQuestionIndex === currentQuestions.length - 1 ? 'Finish <i class="fa-solid fa-flag-checkered ml-2"></i>' : 'Next <i class="fa-solid fa-arrow-right ml-2"></i>'}
                </button>
            </div>
        </div>
    `;
}

function renderEndScreen() {
    let correctCount = 0;
    currentQuestions.forEach(q => {
        if (userAnswers[q.id] === q.answer) correctCount++;
    });
    const pct = Math.round((correctCount / currentQuestions.length) * 100);

    appDiv.innerHTML = `
        <div class="fade-in max-w-2xl mx-auto text-center py-12 bg-white rounded-2xl shadow-sm border border-gray-100 mt-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-100 rounded-full mb-6">
                <i class="fa-solid fa-award text-4xl text-blue-600"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Session Complete!</h2>
            <p class="text-gray-600 mb-8 text-lg">You scored <span class="font-bold text-gray-900">${correctCount}</span> out of <span class="font-bold text-gray-900">${currentQuestions.length}</span> (${pct}%)</p>
            
            <div class="flex justify-center gap-4">
                <button onclick="startReview()" class="bg-rose-500 hover:bg-rose-600 text-white font-semibold py-3 px-6 rounded-lg shadow transition">
                    Review Mistakes
                </button>
                <button onclick="goHome()" class="bg-gray-800 hover:bg-gray-900 text-white font-semibold py-3 px-6 rounded-lg shadow transition">
                    Back to Home
                </button>
            </div>
        </div>
    `;
}

// Initialize
renderHome();

</script>
</body>
</html>
