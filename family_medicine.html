"Evidence Based Medicine (EBM)": [
["In an Alzheimer's disease drug study, the exclusion criteria include previous stroke, a history of vascular dementia, and renal disease. From this we can conclude:", ["A. The patients in this study are so finely selected that the results cannot be applied to the general Alzheimer's disease population and this is an example of \"selection bias\"", "B. The patients in this study are so finely selected that the results cannot be applied to the general Alzheimer's disease population and the results should be generalizable if the medication works so well in this study", "C. This is an example of \"selection bias\"", "D. This is an example of \"selection bias\"", "E. The patients in this study are so finely selected that the results cannot be applied to the general Alzheimer's disease population"], 4, "Strict exclusions reduce external validity (generalizability)."],
["In a diabetes drug study, the exclusion criteria include renal disease, a history of heart failure, coronary artery disease, and peripheral vascular disease. From this we can conclude:", ["A. The results should be generalizable to our general clinic population given the fact that the medication worked so well in this study and this is an example of \"selection bias\"", "B. This is an example of \"selection bias\"", "C. The patients in this study are so finely selected that the results cannot be applied to our general clinic population", "D. The results should be generalizable to our general clinic population given the fact that the medication worked so well in this study", "E. The patients in this study are so finely selected that the results cannot be applied to our general clinic population and this is an example of \"selection bias\""], 2, "Real-world diabetics have comorbidities; excluding them makes study non-generalizable."],
["2 volleyball teams were studied, one given sunblock SPF35 and the other not given anything, then following up and comparing effect on skin, what is the study type?", ["A. Cohort", "B. Randomized controlled", "C. Meta-analysis", "D. Case-control"], 1, "Active intervention assignment defines a controlled trial."],
["You plan to study two groups of patients (A and B) to see if variable XYZ makes any difference in death or recurrent stroke. There is no randomization and there are no interventions. You are just reviewing records to see how each group did. Subjects in group A had a stroke and then had another stroke or died a year later. Subjects in group B had a stroke but were alive with no recurrent stroke at the time of the study. You assess the presence of XYZ in each group. This type of study is called a:", ["A. Prospective study", "B. Meta-analysis study", "C. Case-control study", "D. Cohort study", "E. Randomized control study"], 2, "Starting with outcome and looking back for exposure defines Case-Control."],
["Which of the following regarding the USPSTF recommendations mismatched?", ["A. Means that: the USPSTF recommends the service for all patients and for all age groups. There is high certainty that the net benefit is substantial", "B. Means that: the USPSTF concludes that the current evidence is insufficient to assess the balance of benefits and harms of the service. Evidence is lacking, of poor quality, or conflicting, and the balance of benefits and harms cannot be determined", "C. Means that: the USPSTF recommends against the service. There is moderate or high certainty that the service has no net benefit or that the harms outweigh the benefits", "D. Means that: the USPSTF recommends the service. There is high certainty that the net benefits is moderate or there is moderate certainty that the net benefit is moderate to substantial", "E. Means that: the USPSTF recommends selectively offering or providing this service to induvial patients based on professional judgment and patient preferences. There is at least moderate certainty that the net benefit is small."], 0, "Grade A is NOT 'for all patients/ages'. It's for the specific targeted group."],
["A MEDLINE database search was conducted using keywords melanoma, sunblock, skin..etc. and yielded 8 articles describing effects of sun on melanoma, all figures were merged in one big statistical study showed results, what is the type of the study?", ["A. Cohort", "B. Randomized controlled", "C. Meta-analysis", "D. Case-control"], 2, "Pooling statistical data from multiple studies is Meta-Analysis."],
["A question asking about the differences between case-control & cohort designs. Which of the following is correct?", ["A. Case-control studies are better suited for rare outcomes, while cohort studies are better for common outcomes", "B. Case-control studies are retrospective, while cohort studies are prospective", "C. Case-control studies typically have longer follow-up periods compared to cohort studies", "D. Case-control is cheaper than cohort study", "E. Case-control studies provide better identification of risk factors"], 0, "A and D are correct, but Case-control is best for rare outcomes."],
["Regarding five steps model of evidence-based medicine ALL ARE TRUE EXCEPT:", ["A. Track down with maximum efficiency the best evidence with which to answer them", "B. Critically appraise that evidence for its accountability", "C. Evaluate your performance", "D. Convert information needs into answerable questions", "E. Apply the result of this appraisal in your practice"], 1, "Appraise for validity and applicability, not 'accountability'."],
["What is the best clinical research study that can determine causality between intervention and outcome?", ["A. Case series", "B. Case study", "C. Cross sectional", "D. Randomised clinical trial"], 3, "RCTs are gold standard for proving cause-and-effect."],
["A long question describing a researcher reading a certain study, which of the following should the researcher NOT focus on in this study? (apologies, I don't remember the exact question or what it asked for exactly)", ["A. Type of the study", "B. P value <0.01"], 1, "Focus on clinical significance and study design over just P-value."],
["A patient has chest, back, abdominal pain, has non- specific symptoms, has been having these symptoms for long, seen a lot of drs, does not have an answer:", ["A. Order extensive workup and take detailed history and physical", "B. Don't order many tests blindly and we will follow your symptoms closely and then order investigations accordingly", "C. None of the above"], 1, "Avoid blind tests for unexplained symptoms; observe and follow up."],
["The p value that indicates the lowest probability the results were from chance:", ["A. P<0.01"], 0, "Smaller P-value = less likelihood of random chance."],
["Not an observational study:", ["A. Systemic review"], 0, "Secondary synthesis, not primary observation."],
["Advantage of case control over cohort:", ["A. Cheaper & faster"], 0, "Start with diseased patients, no waiting years."],
["Wrong:", ["A. Novelty is Common, memorable conditions"], 0, "Novelty means rare or unusual, not common."]
],
"Management Plan": [
["Regarding the principles of patient management ALL ARE TRUE except:", ["A. The doctor must fully understand the patient and how their problem affects them", "B. Give the patient the responsibility for the problem", "C. Reaching a shared understanding of the problem with the patient", "D. Investigation to monitor a patient's progress only", "E. Negotiate the management plan"], 3, "Investigations also diagnose and screen, not 'only' monitor."],
["Referral. Which is wrong?", ["A. Doesn't include referral to books", "B. Doctors have to be proficient", "C. Could be to another colleague", "D. When you know that you can't solve the problem", "E. Could be to senior doctor"], 0, "Referral CAN include books or educational materials."],
["Which is false about low back pain?", ["A. If bilateral indicate for imaging", "B. If presented with cauda equina need urgent surgical referral", "C. Must be less than 6 weeks to be acute", "D. We use short period opioid as third line treatment", "E. We can use acetaminophen up to 2g instead of NSAIDs"], 4, "Acetaminophen no longer recommended over NSAIDs for LBP."],

["A case about a patient who's noncompliant with his medications. The best way to know about his compliance is:", ["A. Ask about doses, timing, & names of his medications", "B. Do blood tests for the drugs", "C. Ask him directly if he's taking his medications", "D. Ask him to bring the medication bag & count the pills"], 0, "Describing daily routine reveals true compliance."],
["A case of a 14-year-old boy with DM type 1 who's noncompliant to his medications, what should you do?", ["A. Reassurance", "B. Assess his understanding of his disease", "C. Get the father to be involved", "D. Advise him about the importance of taking the medications"], 1, "Assess knowledge/fears before intervening."],
["A drug that doesn't cause bleeding:", ["A. NSAIDS", "B. Warfarin", "C. ASA", "D. OCP"], 3, "OCPs are pro-thrombotic, others increase bleeding."],
["Patient with pneumonia, you would admit him if:", ["A. WBCs above 7000*106", "B. Urea=18 mg/dl", "C. Diabetic with random blood sugar above 80", "D. He has good family support"], 1, "Elevated BUN is a severity marker (CURB-65) requiring admission."],
["24-year-old male with acute low back pain, what to do?", ["A. Resume exercise as tolerated", "B. Back muscles strengthening"], 0, "Maintaining normal activity is superior to bed rest."],
["Woman 54 with microcytic anemia:", ["A. Refer to hematologist", "B. Observe 3 months", "C. Give ferrous sulphate", "D. Upper and lower endoscopy"], 3, "Requires scopes to rule out GI malignancy."],
["A drug that doesn't cause bleeding:", ["A. NSAIDS", "B. Warfarin", "C. ASA", "D. OCP"], 3, "OCPs cause clotting, not bleeding."],
["Lady with waist circumference 103cm, bp 135/90, FBS 120, HDL 25, cholesterol 170, what is the most appropriate management?", ["A. Serious lifestyle changes", "B. Start on antihypertensive drugs", "C. Give thyroxine"], 0, "First-line for Metabolic Syndrome is aggressive lifestyle modification."],
["Which of the following is not part of management in the 40-year-old female with a painless breast mass?", ["A. Ultrasound & aspiration", "B. Physical examination can differentiate between benign & malignant masses"], 1, "Physical exam CANNOT definitively differentiate benign from malignant."],
["All the followings influence the outcome of the management plan except:", ["A. The patient's attitude towards the doctor"], 0, "Objective compliance/severity dictates outcomes more than sheer attitude."],
["The most imp factor to make the pt more compliant with drugs:", ["A. Knowing about the disease"], 0, "Understanding WHY drug is needed predicts adherence."],
["The most important for patient to take drugs correctly:", ["A. Patient understanding of the illness"], 0, "Without understanding, they won't value treatment."],
["Kid with type 1 DM not adherent:", ["A. Tell him about his illness..."], 0, "Education tailored to development is first step."],
["25-year-old, hyperlipidemic, overweight, started her on statin, came back with increased weight, she stopped the statin, what to do?", ["A. Understand her ideas, concerns and expectations and share in understanding the management"], 0, "Explore her ICE before forcing treatment."],
["Wrong - management plan:", ["A. Made by the doctor alone because he knows more about condition of his pt"], 0, "Paternalistic sole planning leads to poor compliance."],
["After carpel tunnel surgery:", ["A. NSAIDS"], 0, "Standard post-op analgesia."]

"Diagnostic Process + Pt. Centered Medicine": [
["Which of the following statements is FALSE regarding patient centered medicine?", ["A. Patient centered medicine accentuates doctor patient relationship", "B. Care of the family life cycle", "C. It includes the patient's beliefs, ideas, concerns and expectations", "D. Patient centered medicine activates patient's involvement in treatment which does not have a negative impact on the treatment outcome", "E. Patient centered medicine does not affect the compliance of the patients"], 4, "It significantly improves patient compliance."],
["Patient-centered clinicians use the following behavior(s):", ["A. Calm listening with an absence of distracting movements such as fidgeting", "B. Frequent interruptions of the patient to seek clarification indicate concern and commitment to clarity", "C. Lean back in the chair with arms and legs crossed to indicate that the clinician has all the time in the world", "D. Avoid repeatedly asking the patient to provide feedback", "E. Avoid eye contact because it threatens the patient"], 0, "Demonstrates full attention and respect."],
["Wrong about medicine in the past:", ["A. Patients could express feelings and expectations", "B. Doctor had authority", "C. Paternalistic", "D. Domineering", "E. Treating somatic/physical signs only"], 0, "Past medicine rarely asked about feelings or expectations."],
["New medicine compared to past, false:", ["A. Doctor only puts management plan", "B. Turn hospital-based medicine to community-based", "C. Decrease follow up", "D. Diagnosis is a state of probability rather than certainty"], 0, "Management plan is shared, not solely by doctor."],
["Which of the following statements is FALSE regarding patient centered medicine?", ["A. Patient centered medicine accentuates doctor patient relationship", "B. Care of the family life cycle", "C. It includes the patient's beliefs, ideas, concerns & expectations", "D. Patient centered medicine activates patient's involvement in treatment which does not have a negative impact on the treatment outcome", "E. Patient centered medicine does not affect the compliance of the patients"], 4, "Significantly improves patient compliance."],
["Regarding hypotheticodeductive method of problem solving one of these statements is TRUE:", ["A. A comprehensive history including systemic enquiry has to be taken from every patient irrespective of his complaint", "B. Rule-in syndrome is usually a consequence of poorly focused history taking", "C. A diagnosis is usually a statement of certainty rather than probability", "D. Errors in diagnosis result from lack of factual knowledge rather than errors in the diagnostic process", "E. Using time as diagnostic tool does not always avoid unnecessary painful and costly investigations"], 4, "Tincture of time helps, but isn't foolproof."],
["Regarding hypotheticodeductive method of problem solving one of these statements is TRUE:", ["A. A comprehensive history including systemic enquiry has to be taken from every patient irrespective of his complaint", "B. Rule-in syndrome is usually a consequence of poorly focused history taking", "C. A diagnosis is usually a statement of certainty rather than probability", "D. Errors in diagnosis result from lack of factual knowledge rather than errors in the diagnostic process", "E. Deductive is more time consuming & not everyone does it"], 4, "Generating hypotheses is faster; exhaustive deductive takes too long."],
["A 65-year-old male patient complaining of neck pain for several weeks, he denies injury or illness. The pain is aggravated by movement, worse after activities and there is a dull ache in the interscapular region. His examination reveals limited range of motion, tenderness, radiation to his arm, no neurological signs, which one of the following is true?", ["A. The patient will benefit from prednisolone treatment", "B. The patient most likely has cervical intervertebral disc, mechanical pain, tension headache, metastasis", "C. The patient most likely has mechanical pain, osteoarthritis, whiplash, and metastasis", "D. Applying pressure on the head will result in peripheral numbness", "E. During the exam you expect to see erythematous change on skin"], 1, "Classic mechanical degenerative wear-and-tear."],
["30-year-old, nurse, newly married, ill father, complaining of tiredness for the past month, which is wrong?", ["A. May not be due to exhaustion", "B. May be due to anemia", "C. Sometimes you may need to ask about lifestyle", "D. Ask about symptoms of hyperthyroid", "E. Maybe hypertensive or diabetic"], 3, "Hyperthyroid causes hyper-arousal, not primary isolated fatigue."],
["A 32-year-old teacher, a mother of five children presented complaining of tiredness for the last 4 months. All of these statements are correct except one:", ["A. During history taking, we have to know more about the financial difficulties and if her children had behavioral problems", "B. In female patients in her age group we have to ask more questions about pregnancy and menstruation", "C. We have to depend on (whole person medicine) while ranking the diagnostic probabilities", "D. If she gave a history of weight loss, the diagnostic probabilities are as follow; pulmonary TB, anemia, thyrotoxicosis and malignancy", "E. We have to ask about exhaustion following any form of exertion and lasting for a long period"], 3, "Anemia typically doesn't cause weight loss."],
["Wrong about a breast mass:", ["A. 1/4 of patients between 30 and 50", "B. Cystic / solid masses can be differentiated by exam", "C. Do US and aspiration", "D. Risk factors", "E. Mostly fibrocystic changes"], 1, "Palpation cannot distinguish fluid cyst from solid tumor."],
["Which of the following is a feature of metabolic syndrome?", ["A. Hypertriglyceridemia", "B. Hypomagnesemia", "C. Peripheral obesity", "D. High LDL-C", "E. Hypophosphatemia"], 0, "High Triglycerides is a core diagnostic criterion."],
["An old lady with chronic low back pain has taken NSAIDs without improvement, declined physiotherapy, and asked for stronger analgesics. What to do next?", ["A. Prescribe opioids for her", "B. Tell her that opioids are not indicated and not suitable for long-term treatment", "C. Tell her that even if opioids are prescribed, they will not be enough alone and she will need physiotherapy", "D. Ask her why she refused physiotherapy", "E. Tell her that many patients think physiotherapy is useless at first but improve when they try"], 3, "Explore reasoning and barriers before rejecting requests."],
["Red flag in headache:", ["A. New onset after age 45", "B. Immunocompromised patient", "C. Neck pain", "D. Worst at the end of the day", "E. Eye itching"], 1, "Immunocompromised states risk opportunistic brain infections."],
["Metabolic syndrome, which is right?", ["A. Increased abdominal girth, men >88 cm", "B. Women> 88", "C. Triglyceride =< 170", "D. BP>139/89", "E. Glucose >125"], 1, "Women waist > 88 cm is a defining risk factor."],
["Which of the following tests isn't needed for early onset hypertension?", ["A. Renal function tests", "B. Lipid profile", "C. ECG", "D. Calcium", "E. Serum catecholamines"], 4, "Routine catecholamines not indicated unless specific pheo symptoms exist."],
["A patient with multiple masses in the posterior triangle of the neck & B symptoms, the order of differential diagnoses:", ["A. Lipoma - TB - lymphoma", "B. Lymphoma - TB - gastric cancer", "C. TB - gastric cancer - lymphoma", "D. Sarcoid - lymphoma - lipoma", "E. Gastric cancer - TB - sarcoid"], 1, "B symptoms strongly point to Lymphoma first."],
["Pt centered medicine except:", ["A. Social", "B. Concerns", "C. Environment", "D. Expectations"], 2, "Environment matters, but core tenets are ICE (Ideas, Concerns, Expectations)."],
["Principles of diagnosis, except:", ["A. Probability", "B. Certainty", "C. Treatability", "D. Rarity"], 1, "Diagnosis is probabilistic, rarely 100% certainty."],
["30-year-old male patient, a businessman, usually comes to the family medicine department for checkup (the past 3 years). you have seen him only once 6 months ago during a regular checkup and he was perfectly fine. he is a nonsmoker. He comes to your clinic terrified wanting to see you ASAP because in the morning while he was driving he had a chest pain that was referred to his neck and arm, then he started feeling numbness in his hand up until now. your diagnosis:", ["A. MI - Anxiety - Musclo", "B. Anxiety - MI - Musclo", "C. MSS - Anxiety - MI", "D. Cardiovascular"], 1, "Anxiety vastly more PROBABLE in healthy 30yo, MI dangerous but less likely."],
["A 50 year old female patient complaining of 1 year duration of headache after she has been widowed a year ago left with 7 children...wrong:", ["A. You think of migraine...tension.. spondylosis...", "B. If you are sure it is tension you give her antidepressants and advise her to try simple relaxation techniques", "C. If you think of tension you inquire about the prodromal phase of migraine", "D. Ask about symptoms of menopause"], 1, "First-line is simple analgesia/CBT, not immediate antidepressants."],
["12 y/o boy with history of headache for 3 days, his father died 1 month ago, your ddx is:", ["A. Sore throat, meningitis, brain tumor", "B. URTI, teeth pain, eye problem, but meningitis and brain tumor are far", "C. Psychological", "D. Tooth pain"], 1, "Common things are common; tumors/meningitis are less likely."],
["A case about a patient teenager who presented with a picture of acute abdomen (appendicitis). Which of the following is the best for diagnosis?", ["A. CT", "B. History & physical exam", "C. Ultrasound", "D. MRI"], 1, "Primarily a clinical diagnosis based on history and exam."],

["Idiosyncrasy:", ["A. Type of hyperreactivity reaction", "B. Acquired", "C. Genetic", "D. Dose independent"], 2, "Unpredictable, often genetically mediated."],

["A patient that is hard to get information from, how can you make him give true information?", ["A. Open ended questions", "B. Redirecting the conversation every time he diverts from the topic", "C. Engage him in his treatment plan", "D. Ask him directive questions"], 0, "Allows patient space to eventually reveal the truth."],

["About differential diagnosis one wrong statement:", ["A. 40-year-old male with 3 weeks cough (chronic bronchitis, bronchiolitis, whooping, pneumonia)", "B. 20-year-old girl of 3 days cough (URTI, asthma, ...)", "C. Use the 3 phase diagnosis"], 0, "Bronchiolitis/whooping cough are pediatric, unlikely in 40yo."],
["Man recently divorced exercises, came worried and having neck pain, your Dx:", ["A. 1- MS pain 2- anxiety 3- MI", "B. 1- MI 2- pericarditis", "C. 1-anxiety 2- MS pain 3-angina"], 0, "MSK likely, anxiety next, MI dangerous but less likely."],

        let state = { view: 'home', currentTopic: null, questions: [], currentIndex: 0, answers: {}, wrongQuestions: new Set() };
        const appEl = document.getElementById('app');

        function render() { appEl.innerHTML = state.view === 'home' ? renderHome() : renderQuiz(); }

        function renderHome() {
            let topicsHtml = '';
            for (const [topic, qList] of Object.entries(data)) {
                topicsHtml += `<button onclick="startQuiz('${topic}')" class="bg-white border border-slate-200 hover:border-indigo-400 hover:shadow-md transition-all rounded-2xl p-5 text-left group"><h3 class="font-bold text-slate-800 text-lg group-hover:text-indigo-600 transition-colors">${topic}</h3><p class="text-slate-500 text-sm mt-1">${qList.length} Questions</p></button>`;
            }
            return `<div class="fade-in"><div class="mb-8 text-center"><h2 class="text-3xl font-extrabold text-slate-800 mb-3">Select a Topic</h2><p class="text-slate-500">Test your knowledge for the Family Medicine final.</p></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">${topicsHtml}</div><div class="flex flex-col sm:flex-row gap-4 justify-center"><button onclick="startQuiz('All')" class="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-medium shadow-sm transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg> All Questions (Random)</button><button onclick="startQuiz('Review')" class="flex items-center justify-center gap-2 bg-rose-100 hover:bg-rose-200 text-rose-700 px-6 py-3 rounded-xl font-medium shadow-sm transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Review Incorrect (${state.wrongQuestions.size})</button></div></div>`;
        }

        function renderQuiz() {
            if (state.questions.length === 0) return `<div class="text-center py-20 fade-in"><h2 class="text-2xl font-bold text-slate-800 mb-2">Great job!</h2><p class="text-slate-500 mb-6">No questions to review.</p><button onclick="goHome()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors">Return Home</button></div>`;
            const [qText, options, correctIdx, expText] = state.questions[state.currentIndex];
            const isAnswered = !!state.answers[state.currentIndex];
            let optionsHtml = '';
            
            options.forEach((opt, idx) => {
                let btnClasses = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 mb-3 font-medium ";
                if (!isAnswered) btnClasses += "border-slate-200 bg-white hover:border-indigo-300 hover:bg-indigo-50 text-slate-700 cursor-pointer";
                else {
                    btnClasses += "cursor-default ";
                    if (idx === correctIdx) btnClasses += "border-emerald-500 bg-emerald-50 text-emerald-800 shadow-sm";
                    else if (idx === state.answers[state.currentIndex].selected) btnClasses += "border-rose-500 bg-rose-50 text-rose-800 shadow-sm";
                    else btnClasses += "border-slate-100 bg-slate-50 text-slate-400 opacity-60";
                }
                optionsHtml += `<button class="${btnClasses}" ${!isAnswered ? `onclick="selectOption(${idx})"` : 'disabled'}>${opt}</button>`;
            });

            return `<div class="fade-in max-w-3xl mx-auto"><div class="flex items-center justify-between mb-4"><span class="text-sm font-bold text-indigo-600 uppercase tracking-wider">${state.currentTopic}</span><span class="text-sm font-medium text-slate-500 bg-slate-200 px-3 py-1 rounded-full">Q ${state.currentIndex + 1} of ${state.questions.length}</span></div><div class="w-full bg-slate-200 rounded-full h-1.5 mb-8"><div class="bg-indigo-600 h-1.5 rounded-full transition-all duration-300" style="width: ${((state.currentIndex + 1) / state.questions.length) * 100}%"></div></div><div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 mb-6"><h2 class="text-xl md:text-2xl font-semibold text-slate-800 mb-8 leading-snug">${qText}</h2><div class="space-y-1">${optionsHtml}</div>${isAnswered ? `<div class="mt-6 p-4 rounded-xl bg-blue-50 border border-blue-100 text-blue-900 text-sm leading-relaxed"><span class="font-bold block mb-1">Explanation:</span>${expText}</div>` : ''}</div><div class="flex justify-between items-center pb-8"><button onclick="prevQuestion()" class="${state.currentIndex === 0 ? 'opacity-0 pointer-events-none' : ''} flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-medium px-4 py-2">&larr; Previous</button><button onclick="nextQuestion()" class="${state.currentIndex === state.questions.length - 1 ? 'opacity-0 pointer-events-none' : ''} bg-slate-800 hover:bg-black text-white px-6 py-2.5 rounded-xl font-medium shadow-sm">Next &rarr;</button></div></div>`;
        }

        function startQuiz(topic) {
            state.currentTopic = topic; state.currentIndex = 0; state.answers = {};
            if (topic === 'All') state.questions = Object.values(data).flat().sort(() => Math.random() - 0.5);
            else if (topic === 'Review') state.questions = Array.from(state.wrongQuestions);
            else state.questions = [...data[topic]];
            state.view = 'quiz'; window.scrollTo(0, 0); render();
        }

        function goHome() { state.view = 'home'; state.currentTopic = null; render(); }

        function selectOption(idx) {
            if (state.answers[state.currentIndex]) return;
            const qData = state.questions[state.currentIndex];
            const isCorrect = (idx === qData[2]);
            state.answers[state.currentIndex] = { selected: idx, isCorrect: isCorrect };
            if (!isCorrect) state.wrongQuestions.add(qData);
            else if (state.currentTopic === 'Review') state.wrongQuestions.delete(qData);
            render();
        }

        function nextQuestion() { if (state.currentIndex < state.questions.length - 1) { state.currentIndex++; window.scrollTo(0, 0); render(); } }
        function prevQuestion() { if (state.currentIndex > 0) { state.currentIndex--; window.scrollTo(0, 0); render(); } }

        render();
    </script>
</body>
</html>
